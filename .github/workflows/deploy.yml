name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Fetch CV and original-quality images
        run: |
          mkdir -p public/images
          curl -L -f -o public/cv.pdf "https://pub.hyperagent.com/api/published/vBdmnL66HF0On0OWslrShQ/cv.pdf"
          curl -L -f -o public/images/headshot.png "https://pub.hyperagent.com/api/published/M6EHW40yJNJBi1UCK4c2mA/headshot.png"
          curl -L -f -o public/images/ieee-case-2025.jpg "https://pub.hyperagent.com/api/published/QdqQkf6AfHxRCsWt-fcrRA/ieee-case-2025.jpg"
          curl -L -f -o public/images/inhaler-innovations-2025.jpg "https://pub.hyperagent.com/api/published/UhP7nUHrRGEqaFqPNj1WUQ/inhaler-innovations-2025.jpg"
          curl -L -f -o public/images/qtag-senior-design.jpg "https://pub.hyperagent.com/api/published/_RZmf0ZYtVhEYM78HTf82Q/qtag-senior-design.jpg"
          curl -L -f -o public/images/riata-pitch-winner.jpg "https://pub.hyperagent.com/api/published/JtH33WxtZlpr2sdEpNwOHQ/riata-pitch-winner.jpg"

      - name: Build site
        env:
          BASE_PATH: /
          NODE_ENV: production
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
